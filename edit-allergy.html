<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone App Starter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="page-shell">
    <section class="phone-frame" aria-label="Phone application preview">
      <div class="phone-screen">
        <header class="status-bar">
          <span>9:41</span>
          <span>Wi-Fi 100%</span>
        </header>

        <section class="hero">
          <p class="eyebrow">Class Project</p>
          <h1><a href="profile.html">←</a>Edit Allergies</h1>

        </section>

        <section class="content">
          <article class="card card-highlight">
            <div>

              <div style="display: flex; align-items: center; padding: 0px; border-bottom: 1px solid #ddd;"">
                  <h3 class=" card-label">Current Allergies</h3>
              </div>
              <ul style="list-style-type: none; padding: 0; margin: 0;">

                <li class="allergen-item">

                  <span>🥜 Peanuts</span>
                  <button class="warn-notice" style="margin-left: auto; color:firebrick;background:#FF9191">X</button>

                </li>
              </ul>
            </div>

          </article>
          <article class="card card-highlight">
            <div>

              <div style="display: flex; align-items: center; padding: 0px; border-bottom: 1px solid #ddd;"">
                  <h3 class=" card-label">Add Allergy</h3>

              </div>
              <form action="/search" method="get">
                <input type="search" id="site-search" name="q" placeholder="Search...">
                <button class="warn-notice" type="submit">🔍</button>
              </form>
              <ul class="grid-container">

                <li class="allergen-item">
                  <button class="warn-notice-fill">🌰 Tree Nuts</button>
                </li>
                <li class="allergen-item">
                  <button class="warn-notice-fill">🥛 Dairy</button>
                </li>
                <li class="allergen-item">
                  <button class="warn-notice-fill">🥚 Eggs</button>
                </li>
                <li class="allergen-item">
                  <button class="warn-notice-fill">🥜 Shellfish</button>
                </li>
                <li class="allergen-item">
                  <button class="warn-notice-fill">🥜 Other</button>
                </li>
                <li class="allergen-item">
                  <button class="warn-notice-fill">🥜 Other</button>
                </li>
                <li class="allergen-item">
                  <button class="warn-notice-fill">🥜 Other</button>
                </li>
                <li class="allergen-item">
                  <button class="warn-notice-fill">🥜 Other</button>
                </li>
              </ul>
            </div>
          </article>

          <form action="profile.html">
            <button class="primary-button" style="background: green;">Save Changes</button>
          </form>
        </section>

        <nav class="bottom-nav" aria-label="App navigation">
          <a class="nav-item" href="index.html">Home</a>
          <a class="nav-item" href="scan.html">Scan</a>
          <a class="nav-item" href="search.html">Search</a>
          <a class="nav-item" href="places.html">Places</a>
          <a class="nav-item active" href="profile.html">Profile</a>
        </nav>
      </div>
    </section>
  </main>
</body>

</html>
