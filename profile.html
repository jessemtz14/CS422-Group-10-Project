<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone App Starter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="phone-frame" aria-label="Phone application preview">
      <div class="phone-screen">
        <header class="status-bar">
          <span>9:41</span>
          <span>Wi-Fi 100%</span>
        </header>

        <section class="hero">
          <p class="eyebrow">Class Project</p>
          <h1>My Profile</h1>
            <div class="profile-container">
            <img src="https://static.thenounproject.com/png/638636-200.png" width="100" alt="Profile" class="profile-icon">
            <div>
              <h2>John Doe</h3>
              <h3>johndoe@gmail.com</h3>
          </div>
          </div>
        </section>

        <section class="content">
          <article class="card card-highlight">
            <div>
              
               <div style="display: flex; align-items: center; padding: 0px; border-bottom: 1px solid #ddd;"">
                  <h3 class="card-label">My Allergies</h3>
                  <button class="warn-notice" style="margin-left: auto;">Edit</button>
               </div>
              <ul style="list-style-type: none; padding: 0; margin: 0;">
                
                <li class="allergen-item">

                  <span>Peanuts</span>
                  <span class="warn-notice" style="margin-left: auto; color:firebrick;background:#FF9191">Severe</span>

                </li>
                
            </ul>
            </div>
          </article>

          <article class="card">
            <h3 class="card-label">Emergency Contact</h3>
            <ul class="feature-list">
              <h2>Sarah Doe (Mother)</h3>
              <h3>(773) 123-4567</h3>
            </ul>
          </article>

         <button class="primary-button" type="button">View Allergy Card</button>
        </section>

        <nav class="bottom-nav" aria-label="App navigation">
          <a class="nav-item active" href="index.html">Home</a>
          <a class="nav-item" href="scan.html">Scan</a>
          <a class="nav-item" href="search.html">Search</a>
          <a class="nav-item" href="places.html">Places</a>
          <a class="nav-item" href="profile.html">Profile</a>
        </nav>
      </div>
    </section>
  </main>
</body>
</html>
